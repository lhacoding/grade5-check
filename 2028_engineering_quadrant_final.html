<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>2028 공학계열 수시 수능최저 면접 정리</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  :root{
    --bg:#eef3fb;
    --paper:#ffffff;
    --ink:#0b1830;
    --muted:#5d6b80;
    --line:#d8e1ee;
    --line-strong:#bdc9db;
    --navy:#172744;
    --navy2:#273b65;
    --violet:#7480c8;
    --blue:#244c9f;
    --blue-soft:#eef4ff;
    --blue-line:#c7d7f6;
    --green:#0f7a67;
    --green-soft:#eaf6f2;
    --green-line:#bde1d5;
    --orange:#b46a13;
    --shadow:0 18px 42px rgba(25,43,74,.11);
    --shadow-soft:0 8px 20px rgba(25,43,74,.07);
  }
  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{
    margin:0;
    background:linear-gradient(180deg,#e9eef6 0%,#f8faff 58%,#ffffff 100%);
    color:var(--ink);
    font-family:"Pretendard","Noto Sans KR","Apple SD Gothic Neo","Malgun Gothic",Arial,sans-serif;
    letter-spacing:-.025em;
  }
  .wrap{
    width:min(1160px, calc(100% - 24px));
    margin:0 auto;
    padding:16px 0 28px;
  }

  .hero{
    display:block;
    padding:25px 30px 26px;
    border:1px solid rgba(255,255,255,.35);
    border-radius:26px;
    background:
      radial-gradient(circle at 92% 10%, rgba(132,146,212,.62), transparent 34%),
      linear-gradient(135deg,var(--navy) 0%,var(--navy2) 58%,var(--violet) 100%);
    color:#fff;
    box-shadow:var(--shadow);
  }
  .hero h1{
    margin:0;
    font-size:clamp(28px,3vw,40px);
    line-height:1.12;
    font-weight:950;
    letter-spacing:-.075em;
    word-break:keep-all;
  }
  .hero p{
    margin:8px 0 0;
    max-width:790px;
    color:rgba(255,255,255,.82);
    font-size:14px;
    line-height:1.5;
    font-weight:700;
    word-break:keep-all;
  }

  .dot{width:9px;height:9px;border-radius:50%;display:inline-block;}
  .dot.jong{background:var(--blue);} 
  .dot.gyo{background:var(--green);}

  .guide{
    margin:16px 0 12px;
    padding:17px 20px;
    border:1px solid var(--line);
    border-radius:20px;
    background:#fff;
    box-shadow:var(--shadow-soft);
  }
  .guide p{
    margin:0;
    color:#23344f;
    font-size:14.5px;
    line-height:1.55;
    font-weight:750;
    word-break:keep-all;
  }

  .frame-scroll{overflow-x:visible;}
  .frame-area{
    position:relative;
    width:100%;
    margin:0 auto;
    padding:38px 0 38px;
  }
  .axis-label{
    position:absolute;
    z-index:5;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    border-radius:999px;
    background:#fff;
    border:1px solid #d3ddec;
    box-shadow:0 8px 20px rgba(25,43,74,.09);
    color:#0d1d36;
    font-weight:950;
    letter-spacing:-.055em;
    white-space:nowrap;
  }
  .axis-label.top,.axis-label.bottom{
    left:50%;
    transform:translateX(-50%);
    min-height:33px;
    padding:0 14px;
    font-size:18px;
  }
  .axis-label.top{top:3px;}
  .axis-label.bottom{bottom:3px;}

  .axis-label.left,.axis-label.right{
    top:50%;
    min-width:34px;
    min-height:90px;
    padding:12px 7px;
    border-radius:999px;
    font-size:17px;
    line-height:1.05;
    writing-mode:vertical-rl;
    text-orientation:upright;
    letter-spacing:-.08em;
  }
  .axis-label.left{
    left:-42px;
    transform:translate(0,-50%);
  }
  .axis-label.right{
    right:-42px;
    transform:translate(0,-50%);
  }

  .matrix-legend{
    position:absolute;
    top:4px;
    right:46px;
    z-index:6;
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:6px;
  }
  .matrix-legend span{
    display:inline-flex;
    align-items:center;
    gap:5px;
    min-height:26px;
    padding:0 9px;
    border:1px solid #d6e0ed;
    border-radius:999px;
    background:rgba(255,255,255,.94);
    color:#334155;
    font-size:11.5px;
    font-weight:850;
    white-space:nowrap;
    box-shadow:0 6px 14px rgba(25,43,74,.06);
  }

  .matrix{
    border:1px solid var(--line-strong);
    border-radius:23px;
    background:#fff;
    box-shadow:var(--shadow-soft);
    overflow:hidden;
  }
  .quad-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
  }
  .quadrant{
    min-width:0;
    min-height:169px;
    padding:8px 8px 9px;
    background:#fff;
  }
  .q1,.q3{border-right:1px solid var(--line-strong);}
  .q1,.q2{border-bottom:1px solid var(--line-strong);}
  .q1{background:linear-gradient(180deg,#fff5d8 0%,#fffdf6 100%);} /* 수능최저O · 면접X */
  .q2{background:linear-gradient(180deg,#ffeadf 0%,#fff9f5 100%);} /* 수능최저O · 면접O */
  .q3{background:linear-gradient(180deg,#f1ecff 0%,#fcfbff 100%);} /* 수능최저X · 면접X */
  .q4{background:linear-gradient(180deg,#f2f0ea 0%,#fffdf8 100%);} /* 수능최저X · 면접O */

  .q-meta{
    display:none;
  }

  .chips{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(92px,1fr));
    gap:5px;
    align-content:start;
  }
  .q2 .chips{
    grid-template-columns:repeat(2,minmax(124px,150px));
    justify-content:center;
  }
  .chip{
    min-height:37px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:2px;
    padding:4px 4px;
    border:1px solid #cfd8e6;
    border-radius:9px;
    background:#fff;
    text-align:center;
    box-shadow:0 2px 7px rgba(25,43,74,.035);
  }
  .chip.jong{background:var(--blue-soft);border-color:var(--blue-line);}
  .chip.gyo{background:var(--green-soft);border-color:var(--green-line);}
  .chip .u{
    max-width:100%;
    color:#0d1a2f;
    font-size:14px;
    line-height:1.02;
    font-weight:950;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .chip .meta{
    max-width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:3px;
    flex-wrap:nowrap;
    white-space:nowrap;
    overflow:hidden;
  }
  .chip .t{
    color:#4e5e73;
    font-size:10.5px;
    line-height:1.05;
    font-weight:800;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .chip .min{
    color:var(--orange);
    font-size:10.5px;
    line-height:1.05;
    font-weight:950;
    flex:0 0 auto;
  }

  .footer-title{
    margin:10px 4px 0;
    color:#48586e;
    font-size:12.2px;
    line-height:1.35;
    font-weight:850;
    text-align:center;
    word-break:keep-all;
  }

  @media (max-width:980px){
    .wrap{width:calc(100% - 16px);}
    .hero{padding:19px 19px 20px;border-radius:22px;}
    .hero h1{font-size:26px;}
    .guide{padding:15px 16px;}
    .guide p{font-size:13.5px;}
    .frame-scroll{overflow-x:visible;padding-bottom:0;}
    .frame-area{
      width:100%;
      min-width:0;
      padding:38px 34px 38px;
    }
    .axis-label.left{
      left:0;
      transform:translate(0,-50%);
    }
    .axis-label.right{
      right:0;
      transform:translate(0,-50%);
    }
    .chips{
      grid-template-columns:repeat(auto-fit,minmax(82px,1fr));
      gap:4px;
    }
    .q2 .chips{
      grid-template-columns:repeat(auto-fit,minmax(92px,1fr));
      justify-content:stretch;
    }
    .chip{min-height:36px;padding:4px 3px;}
    .chip .u{font-size:13px;}
    .chip .t,.chip .min{font-size:9.8px;}
    .matrix-legend{right:42px;}
  }

  @media (max-width:720px){
    .wrap{width:calc(100% - 12px);padding-top:10px;}
    .hero h1{font-size:22px;}
    .hero p{font-size:12.5px;}
    .frame-area{
      padding:0 10px 0;
    }
    .axis-label.left,
    .axis-label.right,
    .axis-label.top,
    .axis-label.bottom{
      display:none;
    }
    .matrix-legend{
      position:static;
      justify-content:flex-end;
      margin:0 2px 7px;
    }
    .matrix-legend span{
      min-height:24px;
      font-size:10.8px;
      padding:0 8px;
    }
    .matrix{border-radius:18px;}
    .quad-grid{
      grid-template-columns:1fr;
    }
    .quadrant{
      min-height:auto;
      padding:8px;
    }
    .q1,.q3{
      border-right:0;
    }
    .q1,.q2,.q3{
      border-bottom:1px solid var(--line-strong);
    }

    /* 스마트폰 화면에서는 각 구역이 세로로 쌓이므로 배경색을 다르게 해 구분 */
    /* 스마트폰에서는 전형색(교과=연두, 종합=파랑)과 겹치지 않도록 구역 배경색을 별도 계열로 구분 */
    .q1{background:linear-gradient(180deg,#fff5d8 0%,#fffdf6 100%);} /* 수능최저O · 면접X */
    .q2{background:linear-gradient(180deg,#ffeadf 0%,#fff9f5 100%);} /* 수능최저O · 면접O */
    .q3{background:linear-gradient(180deg,#f1ecff 0%,#fcfbff 100%);} /* 수능최저X · 면접X */
    .q4{background:linear-gradient(180deg,#f2f0ea 0%,#fffdf8 100%);} /* 수능최저X · 면접O */

    .q-meta{
      display:flex;
      justify-content:flex-start;
      align-items:center;
      min-height:28px;
      margin-bottom:7px;
    }
    .q-meta::before{
      content:attr(data-label);
      margin-right:auto;
      padding:5px 9px;
      border:1px solid rgba(120,135,160,.24);
      border-radius:999px;
      background:rgba(255,255,255,.72);
      color:#10203a;
      font-size:13px;
      font-weight:950;
      letter-spacing:-.045em;
      box-shadow:0 3px 8px rgba(25,43,74,.035);
    }
    .chips{
      grid-template-columns:repeat(auto-fit,minmax(94px,1fr));
    }
    .chip .u{font-size:13.2px;}
  }

  @media (max-width:430px){
    .hero{padding:16px 15px;border-radius:19px;}
    .hero h1{font-size:20px;}
    .guide p{font-size:13px;}
    .frame-area{padding-left:2px;padding-right:2px;}
    .chips{
      grid-template-columns:repeat(2,minmax(0,1fr));
    }
    .chip .u{font-size:13px;}
  }
</style>

<style id="rule-system-layer">
/* ==========================================================================
   규칙 시스템 레이어 v1 — 사이트 공통 크롬(히어로·메뉴·푸터·컨테이너) 통일 + 토큰
   - 원본 스타일 "뒤"에 배치되어 같은 특이도에서 우선 적용된다.
   - !important는 기존 패치 블록의 !important를 이기기 위한 이행(migration) 용도로
     크롬·컨테이너·카드 패딩에만 한시적으로 사용한다. (완전 재구축 시 제거 대상)
   - 여백/글자/반복폭은 아래 토큰만 사용: 축소 순서 = 여백 → 글자 → 구조 전환
   ========================================================================== */
:root{
  --rs-navy:#172744; --rs-line:#d9e1ef; --rs-line2:#edf1f7; --rs-blue:#5f6ee8;

  ],
};

const LABELS={gyo:"교과", jong:"종합"};
function chip(d){
  const title=`[${LABELS[d.type]}] ${d.uni} ${d.t}${d.min ? ' 최저 '+d.min : ' 최저 없음'}`;
  return `<div class="chip ${d.type}" title="${title}">
    <span class="u">${d.uni}</span>
    <span class="meta">
      <span class="t">${d.t}</span>
      ${d.min ? `<span class="min">${d.min}</span>` : ""}
    </span>
  </div>`;
}
function render(){
  const typeOrder={gyo:0, jong:1};
  Object.keys(DATA).forEach(q=>{
    const ordered=[...DATA[q]].sort((a,b)=>(typeOrder[a.type]-typeOrder[b.type]));
    document.getElementById(`cards-${q}`).innerHTML=ordered.map(chip).join('');
  });
}
render();
</script>

<script id="rule-system-js">
/* 규칙 시스템 레이어 JS — 균형 줄바꿈: 메뉴 6개가 4+2가 아니라 3+3으로 나뉘도록
   rows = ceil(n / 최대열수), cols = ceil(n / rows) 로 행별 개수를 균등 분배한다. */
(function(){
  function balanceGrids(){
    document.querySelectorAll('.global-menu-grid').forEach(function(grid){
      var n = grid.children.length;
      if (!n || !grid.clientWidth) return;
      var cs = getComputedStyle(grid);
      var min = parseFloat(cs.getPropertyValue('--item-min')) || 112;
      var gap = parseFloat(cs.columnGap) || 0;
      var w = grid.clientWidth - parseFloat(cs.paddingLeft) - parseFloat(cs.paddingRight);
      var natural = Math.max(1, Math.floor((w + gap) / (min + gap)));
      var rows = Math.ceil(n / Math.min(natural, n));
      var cols = Math.ceil(n / rows);
      grid.style.gridTemplateColumns = 'repeat(' + cols + ', minmax(0,1fr))';
    });
  }
  var raf = null;
  window.addEventListener('resize', function(){
    cancelAnimationFrame(raf); raf = requestAnimationFrame(balanceGrids);
  });
  window.addEventListener('load', balanceGrids);
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(balanceGrids);
  balanceGrids();
})();
</script>

<script id="balance-grids">
/* 균형 줄바꿈(기준과 동일): 6개 → 4+2가 아니라 3+3 */
(function(){
  function balance(){
    document.querySelectorAll('.global-menu-grid').forEach(function(g){
      var n=g.children.length; if(!n||!g.clientWidth) return;
      var cs=getComputedStyle(g);
      var min=parseFloat(cs.getPropertyValue('--item-min'))||112;
      var gap=parseFloat(cs.columnGap)||0;
      var w=g.clientWidth-parseFloat(cs.paddingLeft)-parseFloat(cs.paddingRight);
      var nat=Math.max(1,Math.floor((w+gap)/(min+gap)));
      var rows=Math.ceil(n/Math.min(nat,n));
      g.style.gridTemplateColumns='repeat('+Math.ceil(n/rows)+',minmax(0,1fr))';
    });
  }
  var raf;
  window.addEventListener('resize',function(){cancelAnimationFrame(raf);raf=requestAnimationFrame(balance);});
  window.addEventListener('load',balance);
  if(document.fonts&&document.fonts.ready)document.fonts.ready.then(balance);
  balance();
})();
</script>
