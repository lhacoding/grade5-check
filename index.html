<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>5등급제 내신 시뮬레이터</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --primary: #4f5eea;
      --primary-soft: #eef2ff;
      --yellow: #f6f36d;
      --green: #d9f99d;
      --purple: #ddd6fe;
      --overall: #dbeafe;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Pretendard", "Noto Sans KR", "Apple SD Gothic Neo", Arial, sans-serif;
    }

    .page {
      width: min(1280px, calc(100% - 28px));
      margin: 0 auto;
      padding: 24px 0 56px;
    }

    .hero {
      background: linear-gradient(135deg, #1d4ed8, #3b82f6);
      color: white;
      padding: 26px 28px;
      border-radius: 24px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 42px);
      letter-spacing: -0.04em;
    }

    .hero p {
      margin: 0;
      color: rgba(255, 255, 255, 0.9);
      line-height: 1.65;
      font-size: 15px;
    }

    .section {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 18px;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 21px;
      letter-spacing: -0.04em;
    }

    #subjectResultSection .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    #subjectResultSection .section-title h2 {
      white-space: nowrap;
      flex-shrink: 0;
    }

    #subjectResultSection .small-note {
      text-align: right;
    }

    @media (max-width: 760px) {
      #subjectResultSection .section-title {
        display: block;
      }

      #subjectResultSection .small-note {
        display: block;
        margin-top: 8px;
        text-align: left;
      }
    }


    .small-note {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
      text-align: right;
    }

    .school-groups {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .school-group {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background: #fafafa;
    }

    .school-group h3 {
      margin: 0 0 10px;
      font-size: 15px;
      color: #374151;
    }

    .tab-row,
    .grade-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .school-tab,
    .grade-tab {
      border: 1px solid var(--line);
      background: white;
      color: #374151;
      padding: 9px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.15s ease;
    }

    .school-tab:hover,
    .grade-tab:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .school-tab.active,
    .grade-tab.active {
      border-color: var(--primary);
      background: var(--primary);
      color: white;
      font-weight: 800;
    }

    .average-filter-title {
      align-items: center;
    }

    .average-filter-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .average-filter-btn {
      border: 1px solid var(--line);
      background: white;
      color: #374151;
      padding: 8px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 800;
      transition: 0.15s ease;
    }

    .average-filter-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .average-filter-btn.active {
      border-color: var(--primary);
      background: var(--primary);
      color: white;
      font-weight: 900;
    }

    .semester-result-grid,
    .subject-result-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(135px, 1fr));
      align-items: stretch;
    }

    .semester-result,
    .subject-result {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: white;
      text-align: center;
      overflow: hidden;
    }

    .semester-result-title,
    .subject-result-title {
      padding: 7px 5px 6px;
      font-weight: 900;
      line-height: 1.2;
      letter-spacing: -0.03em;
      border-bottom: 1px solid rgba(15, 23, 42, 0.06);
      font-size: 15px;
    }

    .semester-result-title.grade1 {
      background: var(--yellow);
      color: #111827;
    }

    .semester-result-title.grade2 {
      background: var(--green);
      color: #111827;
    }

    .semester-result-title.grade3 {
      background: var(--purple);
      color: #111827;
    }

    .semester-result-title.overall {
      background: var(--overall);
      color: #1e3a8a;
    }

    .semester-result-title.nine-conversion {
      background: #e0f2fe;
      color: #075985;
    }

    .semester-result-body,
    .subject-result-body {
      padding: 7px 5px 8px;
    }

    .semester-result.nine-conversion-card .semester-result-body {
      min-height: 106px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .semester-result.nine-conversion-card .nine-range-simple {
      margin-top: 0;
      font-size: 18px;
      line-height: 1.2;
    }

    .result-value {
      display: block;
      font-size: 22px;
      font-weight: 900;
      color: var(--primary);
      letter-spacing: -0.03em;
    }

    .overall-score-grid {
      display: grid;
      grid-template-columns: 0.9fr 1.5fr;
      gap: 8px;
      align-items: stretch;
    }

    .overall-score-box {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 9px 6px;
      background: #f8fafc;
    }

    .overall-score-label {
      display: block;
      margin-bottom: 4px;
      font-size: 11px;
      color: var(--muted);
      font-weight: 800;
    }

    .overall-score-box .result-value {
      font-size: 21px;
    }

    .nine-range-simple {
      display: block;
      margin-top: 5px;
      font-size: 18px;
      font-weight: 900;
      color: var(--primary);
      letter-spacing: -0.03em;
    }

    .subject-result-title.korean {
      background: #f3e1dd;
      color: #7f1d1d;
    }

    .subject-result-title.english {
      background: #dfe6f7;
      color: #1e40af;
    }

    .subject-result-title.math {
      background: #e8e0f6;
      color: #5b21b6;
    }

    .subject-result-title.science {
      background: #dfeedd;
      color: #14532d;
    }

    .subject-result-title.info {
      background: #dff1f4;
      color: #155e75;
    }

    .subject-result-title.social {
      background: #fef3c7;
      color: #92400e;
    }

    .subject-result-title.history {
      background: #ffedd5;
      color: #9a3412;
    }

    .summary-sub {
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.45;
    }

    .input-toolbar {
      align-items: center;
      margin-bottom: 14px;
    }

    .reset-inline-btn {
      border: 1px solid #c7d2fe;
      background: #f8fafc;
      color: #4f46e5;
      padding: 9px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 900;
      transition: 0.15s ease;
    }

    .reset-inline-btn:hover {
      background: #eef2ff;
      border-color: var(--primary);
    }

    .semester-wrap {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .semester-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      background: white;
    }

    .semester-header {
      text-align: center;
      font-size: 22px;
      font-weight: 900;
      padding: 12px 10px;
      border-bottom: 1px solid var(--line);
      letter-spacing: -0.03em;
    }

    .semester-header.grade1 {
      background: var(--yellow);
    }

    .semester-header.grade2 {
      background: var(--green);
    }

    .semester-header.grade3 {
      background: var(--purple);
    }

    .table-scroll {
      width: 100%;
      overflow-x: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 8px 5px;
      text-align: center;
      font-size: 14px;
      white-space: normal;
    }

    th {
      background: #f9fafb;
      font-weight: 900;
    }

    .category-col {
      width: 24%;
    }

    .subject-col {
      width: 34%;
    }

    .credit {
      width: 16%;
    }

    .grade {
      width: 26%;
    }

    th.credit,
    td.credit-cell {
      padding-left: 2px;
      padding-right: 2px;
    }

    td.subject {
      text-align: left;
      font-weight: 800;
      line-height: 1.35;
      word-break: keep-all;
      padding-left: 14px;
    }

    .subject-inner {
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      gap: 4px;
      min-width: 0;
    }

    .subject-name {
      display: inline-block;
      min-width: 0;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      min-width: 44px;
      height: 24px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      line-height: 1;
      white-space: nowrap;
    }

    .category-pill {
      background: #f3f4f6;
      color: #374151;
    }

    .category-pill.korean {
      background: #fee2e2;
      color: #991b1b;
    }

    .category-pill.english {
      background: #dbeafe;
      color: #1e40af;
    }

    .category-pill.math {
      background: #ede9fe;
      color: #5b21b6;
    }

    .category-pill.science {
      background: #dcfce7;
      color: #166534;
    }

    .category-pill.social {
      background: #fef3c7;
      color: #92400e;
    }

    .category-pill.history {
      background: #ffedd5;
      color: #9a3412;
    }

    .category-pill.info {
      background: #cffafe;
      color: #155e75;
    }

    .type-circle.common,
    .type-circle.general,
    .type-circle.career,
    .type-circle.convergence {
      background: #f1f5f9;
      color: #334155;
      border: 1px solid #cbd5e1;
    }

    select {
      width: 58px;
      padding: 6px 5px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: white;
      font-weight: 800;
      text-align: center;
    }

    .subject-select {
      width: 104px;
      max-width: 100%;
      padding-left: 4px;
      padding-right: 4px;
      font-size: 13px;
    }

    .term-summary {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding: 11px 13px;
      background: #fafafa;
      color: #374151;
      font-size: 14px;
      border-top: 1px solid var(--line);
    }

    .term-summary strong {
      font-weight: 900;
    }

    .ready-message {
      padding: 28px;
      text-align: center;
      border: 1px dashed #cbd5e1;
      border-radius: 16px;
      background: #f8fafc;
      color: #475569;
      line-height: 1.7;
    }

    .ready-message strong {
      color: var(--primary);
    }

    @media (max-width: 980px) {
      .school-groups,
      .semester-wrap {
        grid-template-columns: 1fr;
      }

    }

    @media (max-width: 560px) {
      .page {
        width: min(100% - 20px, 1280px);
        padding-top: 14px;
      }

      .semester-result-title,
      .subject-result-title {
        padding: 6px 4px 5px;
        font-size: 14px;
      }

      .semester-result-body,
      .subject-result-body {
        padding: 6px 4px 7px;
      }

      .result-value {
        font-size: 20px;
      }

      .summary-sub {
        margin-top: 4px;
        font-size: 10px;
      }

      .nine-range-simple {
        font-size: 13px;
      }


      .hero,
      .section {
        padding: 16px;
        border-radius: 16px;
      }

      .section-title {
        align-items: flex-start;
        flex-direction: column;
      }

      .small-note {
        text-align: left;
      }

      .semester-result-grid,
      .subject-result-grid {
        gap: 8px;
      }

      .overall-score-grid {
        grid-template-columns: 1fr;
        gap: 5px;
      }

      .overall-score-box {
        padding: 7px 4px;
      }

      .overall-score-label {
        font-size: 9px;
      }

      .overall-score-box .result-value {
        font-size: 16px;
      }

      .nine-range-simple {
        font-size: 14px;
      }

      .summary-sub {
        font-size: 11px;
      }

      th,
      td {
        font-size: 12px;
        padding: 6px 3px;
      }

      td.subject {
        padding-left: 8px;
      }

      .category-col {
        width: 24%;
      }

      .subject-col {
        width: 34%;
      }

      .credit {
        width: 16%;
      }

      .grade {
        width: 26%;
      }

      .pill {
        width: 36px;
        min-width: 36px;
        height: 22px;
        font-size: 10px;
      }

      .subject-inner {
        gap: 4px;
      }

      select {
        width: 44px;
        padding: 5px 2px;
      }

      .subject-select {
        width: 82px;
        font-size: 10px;
      }

      .reset-inline-btn {
        font-size: 12px;
        padding: 8px 10px;
      }

      .semester-header {
        font-size: 18px;
      }
    }
  
    /* 카드 본문 세로 가운데 정렬 보정 */
    .semester-result,
    .subject-result {
      display: flex;
      flex-direction: column;
    }

    .semester-result-title,
    .subject-result-title {
      flex: 0 0 auto;
    }

    .semester-result-body,
    .subject-result-body {
      flex: 1;
      min-height: 72px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .semester-result.nine-conversion-card .semester-result-body {
      min-height: 72px;
    }

    @media (max-width: 560px) {
      .semester-result-body,
      .subject-result-body,
      .semester-result.nine-conversion-card .semester-result-body {
        min-height: 58px;
      }
    }

  </style>
</head>
<body>
  <main class="page">
    <header class="hero">
      <h1>5등급제 내신 시뮬레이터</h1>
      <p>학교별 이수과목과 학점을 기준으로 예상 등급을 바꾸어 보며 학기별 평균과 전체 평균을 비교합니다.</p>
    </header>

    <section class="section">
      <div class="section-title">
        <h2>학교 선택</h2>
        <span class="small-note">초기값은 모든 과목 1등급이며, 내신 반영 여부를 선택할 수 있습니다.</span>
      </div>

      <div class="school-groups">
        <div class="school-group">
          <h3>남고</h3>
          <div class="tab-row" id="boysTabs"></div>
        </div>

        <div class="school-group">
          <h3>여고</h3>
          <div class="tab-row" id="girlsTabs"></div>
        </div>
      </div>
    </section>

    <section class="section" id="semesterResultSection">
      <div class="section-title average-filter-title">
        <h2>학기별 예상 등급</h2>
        <div class="average-filter-buttons">
          <button class="average-filter-btn active" data-average-scope="all" type="button">전체</button>
          <button class="average-filter-btn" data-average-scope="core" type="button">국영수과</button>
        </div>
      </div>

      <div class="semester-result-grid" id="semesterResults"></div>
    </section>

    <section class="section" id="subjectResultSection">
      <div class="section-title">
        <h2>교과군별 예상 등급</h2>
      </div>

      <div class="subject-result-grid" id="subjectResults"></div>
    </section>

    <section class="section" id="inputSection">
      <div class="section-title">
        <h2>성적 입력</h2>
        <span class="small-note">등급 선택을 바꾸면 결과가 자동 계산됩니다.</span>
      </div>

      <div class="grade-tabs input-toolbar">
        <button class="grade-tab active" data-grade-view="1">1학년</button>
        <button class="grade-tab" data-grade-view="2">2학년</button>
        <button class="grade-tab" data-grade-view="3">3학년</button>
        <button class="reset-inline-btn" id="resetBtn" type="button">↺ 모두 1등급 초기화</button>
      </div>

      <div id="semesterTables"></div>
    </section>
  </main>

  <script>
    const schoolTabs = {
      boys: ["송도고", "대건고", "신송고", "연송고"],
      girls: ["해송고", "박문여고", "인천여고"]
    };

    const schoolData = {

          ],
          "1-2": [

            { subject: "공통수학2", category: "수학", courseType: "공통", credit: 4, grade: 1, included: true },
            { subject: "통합과학2", category: "과학", courseType: "공통", credit: 4, grade: 1, included: true },
            { subject: "통합사회2", category: "사회", courseType: "공통", credit: 4, grade: 1, included: true },
            { subject: "한국사2", category: "한국사", courseType: "공통", credit: 3, grade: 1, included: true },

          "2-1": [
            { subject: "문학", category: "국어", courseType: "일반", credit: 3, grade: 1, included: true },
            { subject: "영어1", category: "영어", courseType: "일반", credit: 3, grade: 1, included: true },
            { subject: "대수", category: "수학", courseType: "일반", credit: 3, grade: 1, included: true },
            { subject: "기하", category: "수학", courseType: "진로", credit: 3, grade: 1, included: true },
            { subject: "물리학", category: "과학", courseType: "일반", credit: 3, grade: 1, included: true },
            { subject: "화학", category: "과학", courseType: "일반", credit: 3, grade: 1, included: true },
            { subject: "생명과학", category: "과학", courseType: "일반", credit: 3, grade: 1, included: true },
            { subject: "지구과학", category: "과학", courseType: "일반", credit: 3, grade: 1, included: true },
            { subject: "인공지능기초", category: "정보", courseType: "진로", credit: 3, grade: 1, included: true }
          ],
          "2-2": [

    function interpolateFiveToNineRange(fiveGradeAverage) {
      if (!Number.isFinite(fiveGradeAverage)) {
        return null;
      }

      const table = fiveToNineRangeTable;

      if (fiveGradeAverage <= table[0].five) {
        return { high: table[0].high, avg: table[0].avg, low: table[0].low };
      }

      if (fiveGradeAverage >= table[table.length - 1].five) {
        const last = table[table.length - 1];
        return { high: last.high, avg: last.avg, low: last.low };
      }

      for (let i = 0; i < table.length - 1; i += 1) {
        const left = table[i];
        const right = table[i + 1];

        if (fiveGradeAverage >= left.five && fiveGradeAverage <= right.five) {
          const ratio = (fiveGradeAverage - left.five) / (right.five - left.five);

          return {
            high: left.high + ratio * (right.high - left.high),
            avg: left.avg + ratio * (right.avg - left.avg),
            low: left.low + ratio * (right.low - left.low)
          };
        }
      }

      return null;
    }

    function formatAverage(value) {

      return value.toFixed(2);

    function shouldUseForAverage(item) {
      if (selectedAverageScope === "core") {
        return ["국어", "영어", "수학", "과학"].includes(getItemCategory(item));
      }

      return true;
    }

    function calculateSemesterAverage(subjects) {
      const totals = subjects.reduce(
        (acc, item) => {
          if (!shouldUseForAverage(item)) {
            return acc;
          }

          acc.credit += item.credit;
          acc.weightedGrade += item.credit * item.grade;
          acc.subjects += 1;
          return acc;
        },
        { credit: 0, weightedGrade: 0, subjects: 0 }
      );

      return {
        credits: totals.credit,
        subjects: totals.subjects,
        average: totals.credit === 0 ? 0 : totals.weightedGrade / totals.credit
      };
    }

    function calculateOverall(data) {
      let credits = 0;
      let weightedGrade = 0;
      let subjects = 0;

      Object.values(data.semesters).forEach((semesterSubjects) => {
        semesterSubjects.forEach((item) => {
          if (!shouldUseForAverage(item)) {
            return;
          }

          credits += item.credit;
          weightedGrade += item.credit * item.grade;
          subjects += 1;
        });
      });

      return {
        credits,
        subjects,
        average: credits === 0 ? 0 : weightedGrade / credits
      };
    }

    function calculateSubjectGroupAverages(data) {
      const targetCategories = ["국어", "영어", "수학", "과학", "사회", "한국사", "정보"];
      const result = {};

      targetCategories.forEach((category) => {
        result[category] = {
          credits: 0,
          weightedGrade: 0,
          subjectCount: 0
        };
      });

      Object.values(data.semesters).forEach((semesterSubjects) => {
        semesterSubjects.forEach((item) => {
          const category = getItemCategory(item);

          if (!result[category]) {
            return;
          }

          result[category].credits += item.credit;
          result[category].weightedGrade += item.credit * item.grade;
          result[category].subjectCount += 1;
        });
      });

      return targetCategories.map((category) => {
        const item = result[category];

        return {
          category,
          credits: item.credits,
          subjectCount: item.subjectCount,
          average: item.credits === 0 ? null : item.weightedGrade / item.credits
        };
      });
    }

                  const categoryClass = getCategoryClass(currentCategory);
                  const typeClass = getCourseTypeClass(currentCourseType);

                  const subjectControl = item.subjectOptions
                    ? `<select class="subject-select" data-semester="${semesterName}" data-index="${index}" data-field="subject" aria-label="선택 과목">
                        ${item.subjectOptions.map((option) => `
                          <option value="${option.subject}" ${currentSubject === option.subject ? "selected" : ""}>${option.subject}</option>
                        `).join("")}
                      </select>`
                    : `<span class="subject-name">${currentSubject}</span>`;

                  return `
                    <tr>
                      <td>
                        <span class="pill category-pill ${categoryClass}">${currentCategory}</span>
                      </td>
                      <td class="subject">
                        <span class="subject-inner">
                          <span class="pill type-circle ${typeClass}">${currentCourseType}</span>
                          ${subjectControl}
                        </span>
                      </td>
                      <td class="credit-cell">${item.credit}</td>
                      <td>
                        <select data-semester="${semesterName}" data-index="${index}" data-field="grade" aria-label="${currentSubject} 예상 등급">
                          ${[1, 2, 3, 4, 5].map((grade) => `
                            <option value="${grade}" ${item.grade === grade ? "selected" : ""}>${grade}</option>
                          `).join("")}
                        </select>
                      </td>
                    </tr>
                  `;
                }).join("")}
              </tbody>
            </table>
          </div>
          <div class="term-summary">
            <span>${result.credits}학점</span>
            <strong>${formatAverage(result.average)}등급</strong>
          </div>
        `;

        wrap.appendChild(card);
      });

      semesterTables.appendChild(wrap);

      document.querySelectorAll("select[data-semester]").forEach((select) => {
        select.addEventListener("change", handleInputChange);
      });
    }

    function handleInputChange(event) {
      const data = getCurrentSchoolData();
      const semesterName = event.target.dataset.semester;
      const index = Number(event.target.dataset.index);
      const field = event.target.dataset.field || "grade";

      if (field === "subject") {
        const item = data.semesters[semesterName][index];
        item.subject = event.target.value;

        const option = getSubjectOption(item);
        if (option) {
          item.category = option.category;
          item.courseType = option.courseType;
        }
      } else {
        data.semesters[semesterName][index].grade = Number(event.target.value);
      }

      render();
    }

    function resetAllGrades() {
      const data = getCurrentSchoolData();

      if (!data) {
        return;
      }

      Object.values(data.semesters).forEach((subjects) => {
        subjects.forEach((item) => {
          item.grade = data.defaultGrade;
          if (item.subjectOptions && item.subjectOptions.length > 0) {
            item.subject = item.subjectOptions[0].subject;
            item.category = item.subjectOptions[0].category;
            item.courseType = item.subjectOptions[0].courseType;
          }
        });
      });

      render();
    }

    function render() {
      const data = getCurrentSchoolData();
      renderGradeTabs();
      renderAverageFilterButtons();

      if (!data) {
        renderReadyMessage();
        return;
      }

      renderSemesterResults(data);
      renderSubjectResults(data);
      renderTables(data);
    }

    document.querySelectorAll(".grade-tab").forEach((button) => {
      button.addEventListener("click", () => {
        selectedGradeView = button.dataset.gradeView;
        render();
      });
    });

    averageFilterButtons.forEach((button) => {
      button.addEventListener("click", () => {
        selectedAverageScope = button.dataset.averageScope;
        render();
      });
    });

    resetBtn.addEventListener("click", resetAllGrades);

    createSchoolTabs();
    render();
  </script>
</body>
</html>
