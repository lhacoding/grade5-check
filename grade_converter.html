<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
    :root {
      --bg: #f4f7ff;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #667085;
      --line: #d8e0ef;
      --blue: #5379dd;
      --navy: #233868;
      --range: #14613c;
      --five-bg: #e8efff;
      --five-ink: #233868;
      --nine-bg: #e8f7ef;
      --nine-ink: #14613c;
      --shadow: 0 12px 30px rgba(30, 55, 105, .12);
      --radius: 20px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at top left, #e9efff 0, var(--bg) 38%, #f8faff 100%);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard", "Noto Sans KR", Arial, sans-serif;
    }
    .wrap { max-width: 1280px; margin: 0 auto; padding: 18px 16px 28px; }
    .hero {
      border-radius: 26px;
      overflow: hidden;
      background: linear-gradient(135deg, #4e73da 0%, #7e9eea 100%);
      color: #fff;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }
    .hero-title { text-align: center; padding: 18px 18px 12px; }
    h1 { margin: 0; font-size: clamp(25px, 3.4vw, 39px); letter-spacing: -0.045em; line-height: 1.12; }
    .sub { margin-top: 6px; font-size: 14px; opacity: .92; }
    .calculator {
      background: #fff;
      color: var(--ink);
      padding: 14px;
      display: grid;
      grid-template-columns: minmax(260px, 420px) 1fr;
      gap: 12px;
      align-items: stretch;
    }
    .input-card, .result-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fbfcff;
      padding: 14px;
    }
    .input-card h2 { margin: 0 0 9px; font-size: 19px; letter-spacing: -0.025em; }
    .input-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; }
    input[type="number"] {
      width: 100%;
      border: 1px solid #c8d3e6;
      border-radius: 13px;
      padding: 12px 13px;
      font-size: 16px;
      outline: none;
      background: white;
    }
    input:focus { border-color: var(--blue); box-shadow: 0 0 0 4px rgba(82,119,217,.14); }
    button {
      border: none;
      border-radius: 13px;
      padding: 0 17px;
      background: var(--navy);
      color: white;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }
    .result-card {
      display: grid;
      grid-template-columns: minmax(110px, .9fr) 34px minmax(190px, 1.5fr);
      gap: 10px;
      align-items: stretch;
      background: linear-gradient(180deg, #fbfdff, #eef4ff);
      padding: 12px;
    }
    .result-box {
      background: #ffffff;
      border: 1px solid #dbe4f2;
      border-radius: 16px;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 92px;
    }
    .result-box.input-value { text-align: center; }
    .result-box.range-value { text-align: left; }
    .result-label {
      font-size: 13px;
      font-weight: 950;
      letter-spacing: -0.02em;
      padding: 9px 12px;
      text-align: center;
      border-bottom: 1px solid #dbe4f2;
    }
    .result-label.five-label {
      background: var(--five-bg);
      color: var(--five-ink);
    }
    .result-label.nine-label {
      background: var(--nine-bg);
      color: var(--nine-ink);
    }
    .result-number {
      background: #ffffff;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 58px;
    }
    .result-grade {
      font-size: clamp(28px, 3.1vw, 38px);
      line-height: 1;
      font-weight: 950;
      color: var(--navy);
      letter-spacing: -0.045em;
    }
    .result-range {
      font-size: clamp(31px, 4.2vw, 48px);
      line-height: .98;
      font-weight: 950;
      color: var(--range);
      letter-spacing: -0.055em;
      white-space: nowrap;
    }
    .result-arrow {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--blue);
      font-size: 24px;
      font-weight: 950;
    }
    .result-note {
      margin-top: 6px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }
    .table-card { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); padding: 14px; }
    .table-title { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin: 0 0 10px; }
    .table-title h2 { margin: 0; font-size: 21px; letter-spacing: -0.03em; }
    .mini-note { color: var(--muted); font-size: 12px; }
    .range-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .range-block { border: 1px solid var(--line); border-radius: 16px; overflow: hidden; background: white; }
    .block-title {
      background: #e8efff;
      color: var(--navy);
      font-weight: 900;
      text-align: center;
      padding: 8px 6px;
      border-bottom: 1px solid var(--line);
      letter-spacing: -0.02em;
    }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; font-size: 13px; }
    th, td { padding: 6px 5px; border-bottom: 1px solid #edf1f7; text-align: center; white-space: nowrap; }
    tr:last-child td { border-bottom: none; }
    th { color: #26334d; font-weight: 900; }
    th:nth-child(1) { background: var(--five-bg); color: var(--five-ink); }
    th:nth-child(2) { background: var(--nine-bg); color: var(--nine-ink); }
    td { background: #ffffff; }
    td:first-child { font-weight: 900; color: var(--navy); }
    td:last-child { font-weight: 900; color: var(--range); }
    tr.active td { background: #fff6e4; }
    .footer { color: var(--muted); font-size: 11px; text-align: right; padding: 8px 2px 0; }
    @media (max-width: 1080px) { .range-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 720px) {
      .wrap { padding: 12px 8px 24px; }
      .hero { border-radius: 20px; }
      .calculator { grid-template-columns: 1fr; padding: 10px; }
      .input-row { grid-template-columns: 1fr; }
      button { padding: 12px 16px; }
      .result-card { grid-template-columns: 1fr; gap: 8px; }
      .result-arrow { transform: rotate(90deg); }
      .result-box.range-value { text-align: center; }
      .result-number { align-items: center; }
      .result-range { white-space: normal; }
      .range-grid { grid-template-columns: 1fr; }
      .table-title { display: block; }
      .mini-note { margin-top: 4px; }
    }
    @media print {
      @page { size: A4 landscape; margin: 8mm; }
      body { background: white; }
      .wrap { max-width: none; padding: 0; }
      .hero, .table-card { box-shadow: none; }
      .hero-title { padding: 10px 12px 6px; }
      .calculator { padding: 8px; grid-template-columns: 1fr; }
      .input-card { display: none; }
      .result-card { padding: 8px; grid-template-columns: 100px 24px 1fr; }
      .result-box { min-height: 52px; }
      .result-label { padding: 5px 8px; font-size: 10px; }
      .result-number { min-height: 38px; padding: 7px 8px; }
      .result-grade { font-size: 20px; }
      .result-range { font-size: 28px; }
      .table-card { padding: 8px; }
      .range-grid { grid-template-columns: repeat(4, 1fr); gap: 6px; }
      th, td { padding: 4px 3px; font-size: 10px; }
      .block-title { padding: 5px; }
    }

  <style id="responsive-fix">
    /* 반응형 보완: 여백을 먼저 줄이고, 더 줄일 수 없을 때만 줄바꿈 */
    /* 제목 밴드와 본문 카드를 다른 페이지처럼 분리 */

    /* 제목 밴드 위·아래 여백을 제목에 맞춰 대칭으로 줄임 */
    .hero-title{ padding:clamp(13px,1.6vw,17px) clamp(18px,3vw,30px)!important; }
    /* 결과 카드: 9등급 범위 숫자가 칸을 넘지 않도록 크기 조정 */
    .result-range{ font-size:clamp(20px,2.3vw,30px)!important; letter-spacing:-.02em!important; white-space:nowrap!important; }
    .result-card{ grid-template-columns:minmax(0,.9fr) 26px minmax(0,1.5fr)!important; }
    .result-box{ min-width:0!important; }
    .result-box.range-value{ min-width:0!important; }
    .result-number{ padding-left:9px!important; padding-right:9px!important; overflow:hidden!important; }
    .calculator{
      grid-template-columns:repeat(auto-fit,minmax(min(100%,260px),1fr))!important;
      gap:clamp(8px,1.6vw,16px)!important;
      border:1px solid #d9e1ef!important; border-top:1px solid #d9e1ef!important;
      border-radius:22px!important; box-shadow:0 12px 30px rgba(31,49,81,.08)!important;
      margin-bottom:16px!important; padding:clamp(12px,2vw,18px)!important;
    }
    .range-grid{ grid-template-columns:repeat(auto-fit,minmax(min(100%,210px),1fr))!important; gap:clamp(8px,1.4vw,10px)!important; }
    /* 범위표: 5등급제 칸을 좁히고 9등급제 범위 칸을 넓혀 헤더 잘림 방지 */
    .range-block table th:nth-child(1), .range-block table td:nth-child(1){ width:33%!important; }
    .range-block table th:nth-child(2), .range-block table td:nth-child(2){ width:67%!important; }
    .range-block table th, .range-block table td{ padding-left:4px!important; padding-right:6px!important; }
    .range-block table th{ white-space:normal!important; word-break:keep-all!important; line-height:1.2; }

  return DATA.reduce((best, row) => Math.abs(row.five - v) < Math.abs(best.five - v) ? row : best, DATA[0]);
}
function renderResult(row, rawValue) {
  const inputValue = Number(rawValue);
  const gradeText = Number.isNaN(inputValue) ? fmt(row.five) : fmt(inputValue);
  const note = Math.abs(inputValue - row.five) > 0.001 ? `<div class="result-note">가까운 기준 ${fmt(row.five)}</div>` : ``;
  $('result').innerHTML = `
    <div class="result-box input-value">
      <div class="result-label five-label">5등급제</div>
      <div class="result-number">
        <div class="result-grade">${gradeText}</div>
        ${note}
      </div>
    </div>
    <div class="result-arrow">→</div>
    <div class="result-box range-value">
      <div class="result-label nine-label">9등급제 예상 범위</div>
      <div class="result-number">
        <div class="result-range">${fmt(row.finalLow)} ~ ${fmt(row.finalHigh)}</div>
      </div>
    </div>
  `;
}
function groupRows() {
  return [
    { title: '5등급제 1점대', rows: DATA.filter(r => r.five >= 1 && r.five < 2) },
    { title: '5등급제 2점대', rows: DATA.filter(r => r.five >= 2 && r.five < 3) },
    { title: '5등급제 3점대', rows: DATA.filter(r => r.five >= 3 && r.five < 4) },
    { title: '5등급제 4~5점대', rows: DATA.filter(r => r.five >= 4 && r.five <= 5) }
  ];
}
function renderTable(activeFive=null) {
  grid.innerHTML = groupRows().map(group => `
    <section class="range-block">
      <div class="block-title">${group.title}</div>
      <table>
        <thead><tr><th>5등급제</th><th>9등급제 예상 범위</th></tr></thead>
        <tbody>
          ${group.rows.map(row => `
            <tr class="${activeFive !== null && fmt(row.five) === fmt(activeFive) ? 'active' : ''}">
              <td>${fmt(row.five)}</td>
              <td>${fmt(row.finalLow)} ~ ${fmt(row.finalHigh)}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </section>
  `).join('');
}
function runCalc() {
  const val = $('gradeInput').value;
  const row = nearestRow(val);
  renderResult(row, val);
  renderTable(row.five);
}
$('calcBtn').addEventListener('click', runCalc);
$('gradeInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') runCalc(); });
renderTable();
renderResult(nearestRow(1.30), 1.30);
</script>
</body>
</html>
